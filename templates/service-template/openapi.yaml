openapi: 3.1.0
info:
  title: TrackMind Nexus Service Template API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
  /ready:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Service dependencies are ready
  /live:
    get:
      summary: Liveness check
      responses:
        '200':
          description: Service process is alive
  /metrics:
    get:
      summary: Prometheus-compatible metrics placeholder
      responses:
        '200':
          description: Metrics are available
