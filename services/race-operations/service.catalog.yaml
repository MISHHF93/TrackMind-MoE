    - race-stop
    - scratch-horse
    - race-status-change
    - official-results
observability:
  slo:
    availability: 99.9
    p95LatencyMs: 250
  dashboards:
    - race-day-command
  alerts:
    - approval-queue-sla
    - race-state-projection-lag
