openapi: 3.1.0
info:
  title: TrackMind Stewarding Service API
  version: 0.1.0
  description: Contract-only stewarding scaffold. Runtime reference implementation currently lives in apps/api/src/stewarding.ts and apps/api/src/services/stewardingService.ts.
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200': { description: Service is healthy }
  /ready:
    get:
      summary: Readiness check
      responses:
        '200': { description: Rulebook, evidence, approval, and audit dependencies are ready }
  /live:
    get:
      summary: Liveness check
      responses:
        '200': { description: Service process is alive }
  /metrics:
    get:
      summary: Stewarding inquiry and approval metrics
      responses:
        '200': { description: Metrics are available }
