service:
  name: stewarding-service
  owner: stewards
  tier: mission-critical
  boundedContext: stewarding
  dataClassification: regulated
  tenantIsolation: required
  currentReferenceImplementation:
    - apps/api/src/stewarding.ts
    - apps/api/src/services/stewardingService.ts
    - apps/api/src/stewardOperationsPlatform.ts
  runtimeDelegation:
    stewardOperationsPlatform:
      listEvidence: stewardingService.listEvidenceReferences
      getEvidence: stewardingService.getEvidenceReference
      addEvidence: stewardingService.uploadEvidenceReference
      issueFinalRuling: stewardingService.issueFinalRuling
  humanApprovalRequiredFor:
    - steward-decision
    - steward-ruling
    - official-results
    - disciplinary-decision
observability:
  slo:
    availability: 99.9
    p95LatencyMs: 250
  dashboards:
    - steward-center
  alerts:
    - evidence-custody-gap
    - pending-final-approval-sla
